name: Обновление лучших конфигов каждые 5 часов

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-configs
  cancel-in-progress: true

jobs:
  scan-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Синхронизировать с удалённым репозиторием
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull origin main --rebase || git pull origin main --no-rebase || true

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Сканировать подписку 1 (Mobile-2)
        run: |
          python3 scanner.py \
            --sub "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" \
            --mode quick \
            --skip-download \
            --top 0 \
            --no-tui \
            --output-configs temp1.txt
      - name: Сканировать подписку 2 (Mobile)
        run: |
          python3 scanner.py \
            --sub "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" \
            --mode quick \
            --skip-download \
            --top 0 \
            --no-tui \
            --output-configs temp2.txt
      - name: Сканировать подписку 3 (Black VLESS RUS mobile)
        run: |
          python3 scanner.py \
            --sub "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt" \
            --mode quick \
            --skip-download \
            --top 0 \
            --no-tui \
            --output-configs temp3.txt
      - name: Объединить и отобрать все рабочие
        run: |
          cat temp1.txt temp2.txt temp3.txt | awk 'NF && !seen[$0]++' > best_configs.txt
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Настраиваем remote с токеном явно
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          echo "=== Статус ==="
          git status
          git log --oneline -3
          # Добавляем файлы
          git add best_configs.txt
          # Проверяем, есть ли изменения для коммита
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
            exit 0
          fi
          git commit -m "Автообновление: все рабочие конфиги"
          # Получаем свежие изменения перед пушем (нужно, если кто-то запушил пока мы работали)
          echo "=== Получаем последние изменения ==="
          git pull origin main --rebase || {
            echo "Rebase не удался, пробуем merge"
            git rebase --abort 2>/dev/null || true
            git pull origin main --no-rebase || {
              echo "Pull не удался, пропускаем пуш"
              exit 0
            }
          }
          echo "=== Пушим ==="
          git push origin main
