name: Обновление лучших конфигов каждые 5 часов

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-configs
  cancel-in-progress: true

jobs:
  scan-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Синхронизировать с удалённым репозиторием
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull origin main --rebase || git pull origin main --no-rebase || true

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Сканировать подписку 1
        run: |
          python3 scanner.py \
            --sub "https://raw.githubusercontent.com/AvenCores/goida-vpn-configs/refs/heads/main/githubmirror/1.txt" \
            --mode quick \
            --skip-download \
            --top 0 \
            --no-tui \
            --output-configs temp1.txt
      - name: Сканировать подписку 2
        run: |
          python3 scanner.py \
            --sub "https://raw.githubusercontent.com/AvenCores/goida-vpn-configs/refs/heads/main/githubmirror/2.txt" \
