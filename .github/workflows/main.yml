      - name: Объединить и отобрать все рабочие
        run: |
          cat temp1.txt temp2.txt temp3.txt temp4.txt temp5.txt temp6.txt temp7.txt temp8.txt temp9.txt temp10.txt temp11.txt temp12.txt temp13.txt temp14.txt temp15.txt temp16.txt temp17.txt temp18.txt temp19.txt temp20.txt temp21.txt temp22.txt temp23.txt temp24.txt temp25.txt temp26.txt | awk 'NF && !seen[$0]++' > best_configs.txt
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Настраиваем remote с токеном явно
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          echo "=== Статус ==="
          git status
          git log --oneline -3
          # Добавляем файлы
          git add best_configs.txt
          # Проверяем, есть ли изменения для коммита
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
            exit 0
          fi
          git commit -m "Автообновление: все рабочие конфиги"
          # Получаем свежие изменения перед пушем (нужно, если кто-то запушил пока мы работали)
          echo "=== Получаем последние изменения ==="
          git pull origin main --rebase || {
            echo "Rebase не удался, пробуем merge"
            git rebase --abort 2>/dev/null || true
            git pull origin main --no-rebase || {
              echo "Pull не удался, пропускаем пуш"
              exit 0
            }
          }
          echo "=== Пушим ==="
          git push origin main
